<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Screen — Feed (Someone Liked Your Story)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../duolingo-design.css">
  <link rel="stylesheet" href="../design-system.css">
  <style>
    .screen {
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 8px;
      flex-shrink: 0;
    }

    .feed-title {
      font-size: 24px;
      font-weight: 900;
      color: #1a1a1a;
    }

    .bell-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #afafaf;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .friend-activity {
      margin: 0 16px 14px;
      border: 2px solid #e5e5e5;
      border-radius: 14px;
      padding: 14px 12px 18px;
      flex-shrink: 0;
    }

    .friend-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar-lg {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: contain;
      border: 2.5px solid #57cc02;
      background: #e8d5ff;
      flex-shrink: 0;
    }

    .add-friend-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px dashed #d9d9d9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d9d9d9;
      font-size: 20px;
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'Nunito', sans-serif;
    }

    .feed-list {
      padding: 0 16px;
      flex: 1;
    }

    .feed-item-meta {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .avatar-sm {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: contain;
      flex-shrink: 0;
      background: #b3d9ff;
    }

    .meta-text { flex: 1; padding-top: 2px; }

    .meta-action {
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.4;
    }

    .meta-action .user-name { font-weight: 900; }
    .meta-action .gray-text { color: #afafaf; }

    .meta-time {
      font-size: 12px;
      font-weight: 700;
      color: #d9d9d9;
      margin-top: 2px;
    }

    .more-dots {
      color: #afafaf;
      font-size: 20px;
      line-height: 1;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      letter-spacing: 1px;
    }

    .story-card {
      background: #4f83ff;
      border-radius: 13px;
      height: 147px;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
      display: block;
      text-decoration: none;
    }

    .story-badges {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .story-badge-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.27);
      border-radius: 13px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      color: white;
    }

    .flag-mini {
      display: inline-flex;
      width: 12px;
      height: 9px;
      border-radius: 1.5px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .flag-mini span { flex: 1; display: block; }

    .play-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .story-title-text {
      position: absolute;
      bottom: 36px;
      left: 12px;
      font-size: 14px;
      font-weight: 900;
      color: white;
      width: 155px;
      line-height: 1.3;
    }

    .story-stars {
      position: absolute;
      bottom: 10px;
      left: 12px;
      display: flex;
      gap: 2px;
    }

    .story-char {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 130px;
      height: 120px;
      object-fit: contain;
      object-position: right bottom;
    }

    /* Reaction row */
    .reaction-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      position: relative;
    }

    .reaction-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: 1px solid #afafaf;
      border-radius: 9px;
      box-shadow: 0 1px 0 #afafaf;
      background: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: #4b4b4b;
      font-family: 'Nunito', sans-serif;
      padding: 0 12px;
      min-width: 41px;
      height: 31px;
    }

    /* "1" count badge on heart */
    .like-count {
      font-size: 12px;
      font-weight: 900;
      color: #4b4b4b;
    }

    /* "SOMEONE LIKED YOUR STORY!" tooltip */
    .liked-tooltip {
      position: absolute;
      right: 0;
      bottom: 38px;
      background: #f857a6;
      color: white;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.35;
      padding: 10px 12px;
      border-radius: 14px;
      width: 90px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(248,87,166,0.35);
    }

    .liked-tooltip::after {
      content: '';
      position: absolute;
      bottom: -7px;
      left: 16px;
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 8px solid #f857a6;
    }

    .feed-divider {
      height: 1px;
      background: #e5e5e5;
      margin: 2px 0 14px;
    }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .activity-avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: contain;
      flex-shrink: 0;
      background: #ffd6a5;
    }

    .activity-avatar.alt { background: #e8d5ff; }

    .activity-body { padding-top: 2px; }

    .activity-name-line {
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .activity-name-line strong { font-weight: 900; }
    .activity-name-line .gray { color: #afafaf; }

    .activity-time {
      font-size: 12px;
      font-weight: 700;
      color: #d9d9d9;
      margin-top: 2px;
    }

    .award-card {
      background: #ffcf8c;
      border-radius: 13px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .trophy-icon { font-size: 26px; flex-shrink: 0; }

    .award-text {
      font-size: 14px;
      font-weight: 900;
      color: white;
      line-height: 1.3;
    }

    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 38px;
      border-top: 1.5px solid #e5e5e5;
      background: white;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
    }

    .nav-btn img { width: 28px; height: 28px; object-fit: contain; }
    .nav-btn.active { background: #ddf4ff; border: 2px solid #63c9f9; }

    .nav-purple-pill {
      width: 29px; height: 29px;
      background: #ce82ff; border-radius: 100px; border: none; cursor: pointer;
    }
  </style>
</head>
<body class="demo-page">
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">7:11</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><circle cx="8" cy="10.5" r="1.5" fill="currentColor"/><path d="M8 6C6.2 6 4.6 6.8 3.4 8L2.4 7C3.9 5.5 5.8 4.6 8 4.6s4.1.9 5.6 2.4L12.6 8C11.4 6.8 9.8 6 8 6z" fill="currentColor"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="currentColor"/></svg>
      </div>
    </div>

    <main class="screen">
      <!-- Feed header -->
      <div class="feed-header">
        <h1 class="feed-title">Feed</h1>
        <button class="bell-btn" aria-label="Notifications">
          <svg width="20" height="22" viewBox="0 0 20 22" fill="none">
            <path d="M10 22c1.1 0 2-.9 2-2H8c0 1.1.9 2 2 2zm8-6v-6c0-3.93-2.36-7.14-6-7.82V1.5C12 .67 11.33 0 10.5 0h-1C8.67 0 8 .67 8 1.5v.68C4.37 2.86 2 6.06 2 10v6L0 18v1h20v-1l-2-2z" fill="#afafaf"/>
          </svg>
        </button>
      </div>

      <!-- Friend activity -->
      <div class="friend-activity">
        <div class="friend-row">
          <img class="user-avatar-lg" src="../Image/figma-assets/Duolingo-bird-reading.png" alt="Me">
          <button class="add-friend-circle">+</button>
          <button class="add-friend-circle">+</button>
          <button class="add-friend-circle">+</button>
          <button class="add-friend-circle">+</button>
        </div>
      </div>

      <!-- Feed list -->
      <div class="feed-list">

        <!-- My published story -->
        <div class="feed-item-meta">
          <img class="avatar-sm" src="../Image/figma-assets/Actor-scared-sweating.png" alt="Me">
          <div class="meta-text">
            <div class="meta-action"><span class="user-name">Me</span> <span class="gray-text">published a new story</span></div>
            <div class="meta-time">2 hours ago</div>
          </div>
          <button class="more-dots">···</button>
        </div>

        <!-- Story card -->
        <a href="hifi-story-detail.html" class="story-card">
          <div class="story-badges">
            <span class="story-badge-pill">
              <span class="flag-mini">
                <span style="background:#1cb0f6;"></span>
                <span style="background:#e5e5e5;"></span>
                <span style="background:#ff4b4b;"></span>
              </span>
              French
            </span>
            <span class="story-badge-pill">intermediate</span>
            <span class="play-badge">
              <svg width="8" height="10" viewBox="0 0 8 10" fill="white"><polygon points="0,0 8,5 0,10"/></svg>
              0
            </span>
          </div>
          <div class="story-title-text">La célébrité ce soir</div>
          <div class="story-stars">
            <svg width="16" height="16" viewBox="0 0 24 24"><polygon points="12,2 15.1,8.9 22.6,9.9 17.3,15.1 18.7,22.5 12,19 5.3,22.5 6.7,15.1 1.4,9.9 8.9,8.9" fill="#ffc800"/></svg>
            <svg width="16" height="16" viewBox="0 0 24 24"><polygon points="12,2 15.1,8.9 22.6,9.9 17.3,15.1 18.7,22.5 12,19 5.3,22.5 6.7,15.1 1.4,9.9 8.9,8.9" fill="#ffc800"/></svg>
            <svg width="16" height="16" viewBox="0 0 24 24"><polygon points="12,2 15.1,8.9 22.6,9.9 17.3,15.1 18.7,22.5 12,19 5.3,22.5 6.7,15.1 1.4,9.9 8.9,8.9" fill="#ffc800"/></svg>
            <svg width="16" height="16" viewBox="0 0 24 24"><polygon points="12,2 15.1,8.9 22.6,9.9 17.3,15.1 18.7,22.5 12,19 5.3,22.5 6.7,15.1 1.4,9.9 8.9,8.9" fill="#ffc800"/></svg>
            <svg width="16" height="16" viewBox="0 0 24 24"><polygon points="12,2 15.1,8.9 22.6,9.9 17.3,15.1 18.7,22.5 12,19 5.3,22.5 6.7,15.1 1.4,9.9 8.9,8.9" fill="none" stroke="#ffc800" stroke-width="1.5"/></svg>
          </div>
          <img class="story-char" src="../Image/figma-assets/Actor-scared-sweating.png" alt="">
        </a>

        <!-- Reaction row — heart now has "1" and tooltip shown -->
        <div class="reaction-row">
          <button class="reaction-btn" style="border-color:#ff4b4b; color:#ff4b4b;">
            <svg width="15" height="14" viewBox="0 0 24 22" fill="#ff4b4b" stroke="#ff4b4b" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span class="like-count" style="color:#ff4b4b;">1</span>
          </button>
          <button class="reaction-btn">
            <svg width="15" height="14" viewBox="0 0 24 24" fill="none" stroke="#4b4b4b" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button class="reaction-btn">
            <svg width="14" height="15" viewBox="0 0 24 24" fill="none" stroke="#4b4b4b" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>

          <!-- Notification tooltip -->
          <div class="liked-tooltip">
            SOMEONE LIKED YOUR STORY!
          </div>
        </div>

        <div class="feed-divider"></div>

        <!-- Bob earned badge (5h ago) -->
        <div class="activity-item">
          <img class="activity-avatar" src="../Image/figma-assets/Black-character-confident.png" alt="Bob K.">
          <div class="activity-body">
            <div class="activity-name-line"><strong>Bob K.</strong> <span class="gray">earned a new badge</span></div>
            <div class="activity-time">5 hours ago</div>
          </div>
        </div>
        <div class="award-card">
          <span class="trophy-icon">🏆</span>
          <span class="award-text">Best story teller award</span>
        </div>

        <div class="feed-divider"></div>

        <!-- Bob earned badge (13h ago) -->
        <div class="activity-item">
          <img class="activity-avatar alt" src="../Image/figma-assets/Black-character-confident.png" alt="Bob K.">
          <div class="activity-body">
            <div class="activity-name-line"><strong>Bob K.</strong> <span class="gray">earned a new badge</span></div>
            <div class="activity-time">13 hours ago</div>
          </div>
        </div>

      </div>

      <!-- Bottom nav -->
      <nav class="bottom-nav">
        <button class="nav-btn">
          <img src="../Image/figma-assets/Bottom Nav Button-Left-1-home-birdhouse.png" alt="Home">
        </button>
        <button class="nav-btn">
          <img src="../Image/figma-assets/Bottom Nav Button-left-2-chest-40by40.png" alt="Rewards">
        </button>
        <button class="nav-btn">
          <img src="../Image/figma-assets/Bottom Nav Button-left3-dumbell.png" alt="Learn">
        </button>
        <button class="nav-btn active">
          <img src="../Image/figma-assets/feed-icon-left-5.png" alt="Feed">
        </button>
        <button class="nav-btn">
          <img src="../Image/figma-assets/feed-icon-left-5.png" alt="Stories">
        </button>
        <button class="nav-purple-pill" aria-label="Profile"></button>
      </nav>
    </main>
  </div>

  <a class="home-fab" href="../index.html">🏠 Main Page</a>
</body>
</html>
