<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Screen — Character Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system.css">
  <style>
    .screen {
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 6px;
      flex-shrink: 0;
    }
    .top-bar-close {
      width: 32px; height: 32px;
      border: none; background: none; cursor: pointer;
      font-size: 22px; color: #afafaf;
      font-family: 'Nunito', sans-serif; font-weight: 400;
      display: flex; align-items: center; justify-content: center;
    }
    .top-bar-title {
      font-family: 'Nunito', sans-serif;
      font-size: 22px; font-weight: 900; color: #1a1a1a;
    }
    .top-bar-done {
      border: none; background: none; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 900;
      color: #ff9600; text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ── Character slots ── */
    .char-slots {
      display: flex; align-items: center; gap: 10px;
      padding: 2px 16px 6px; flex-shrink: 0;
    }
    .char-slot-label {
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 700; color: #afafaf; text-transform: uppercase;
    }
    .char-slot-dots { display: flex; gap: 8px; align-items: center; }
    .char-slot-dot {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid #d9d9d9; background: white;
    }
    .char-slot-dot.active { background: #ff9600; border-color: #ff9600; }

    /* ── Canvas ── */
    .canvas-wrap {
      position: relative;
      height: 192px; flex-shrink: 0;
      background: #ddf4ff;
      border-top: 2px solid #d9d9d9;
      border-bottom: 2px solid #d9d9d9;
      overflow: hidden;
    }
    .char-preview-area {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 0;
    }
    .char-preview-area svg { width: 168px; height: 168px; }

    .canvas-trash {
      position: absolute; top: 10px; left: 12px;
      width: 26px; height: 30px;
      cursor: pointer; background: none; border: none; opacity: 0.7;
    }
    .canvas-zoom {
      position: absolute; top: 10px; right: 10px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .zoom-btn {
      width: 28px; height: 28px;
      border: 2px solid #1cb0f6; border-radius: 50%;
      background: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: #1cb0f6;
      font-weight: 400; font-family: 'Nunito', sans-serif;
      line-height: 1;
    }
    .zoom-track {
      width: 3px; height: 52px; background: #1cb0f6;
      border-radius: 2px; position: relative; margin: 2px 0;
    }
    .zoom-thumb {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 18px; height: 7px;
      background: #1cb0f6; border-radius: 4px;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; align-items: center;
      border-bottom: 2px solid #e5e5e5;
      flex-shrink: 0; padding: 0 8px;
    }
    .tab-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 8px 0 6px;
      cursor: pointer; border: none; background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      color: #afafaf;
    }
    .tab-btn.active { border-bottom-color: #1cb0f6; color: #1cb0f6; }
    .tab-btn svg { width: 28px; height: 28px; }

    .templates-pill {
      border: 2px solid #1cb0f6;
      border-radius: 14px;
      padding: 4px 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 800;
      color: #1cb0f6; text-transform: uppercase;
      background: none; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
      margin-left: 4px;
    }

    /* ── Scrollable content ── */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .section-label {
      font-family: 'Nunito', sans-serif;
      font-size: 9px; font-weight: 700;
      color: #afafaf; text-transform: uppercase;
      padding: 10px 16px 6px;
    }

    /* ── Color swatches ── */
    .colors-row { display: flex; gap: 6px; padding: 0 14px 10px; flex-wrap: nowrap; }
    .color-swatch {
      width: 44px; height: 44px;
      border-radius: 8px; cursor: pointer;
      border: 3px solid transparent; flex-shrink: 0;
      transition: border-color 80ms;
    }
    .color-swatch.selected { border-color: #1cb0f6; }

    /* ── Asset grid ── */
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; padding: 4px 14px 16px;
    }
    .asset-cell {
      aspect-ratio: 1;
      border-radius: 22px;
      border: 4px solid #d9d9d9;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden;
      background: #fafafa; position: relative;
      transition: border-color 80ms;
    }
    .asset-cell.selected { border-color: #63c9f9; }
    .asset-cell img {
      width: 68%; height: 68%;
      object-fit: contain; display: block;
    }
    .asset-cell-placeholder {
      width: 48px; height: 48px;
      border-radius: 10px; background: #e5e5e5;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 38px;
      border-top: 1.5px solid #e5e5e5;
      background: white; flex-shrink: 0;
    }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
    }
    .nav-btn img { width: 28px; height: 28px; object-fit: contain; }
    .nav-purple-pill {
      width: 29px; height: 29px;
      background: #ce82ff; border-radius: 100px;
      border: none; cursor: pointer;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.48);
    }
    .modal-card {
      position: relative; z-index: 1;
      background: white; border-radius: 24px;
      padding: 24px 20px 20px;
      width: 270px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal-x {
      position: absolute; top: 12px; right: 14px;
      border: none; background: none;
      font-size: 18px; cursor: pointer;
      color: #afafaf; font-family: 'Nunito', sans-serif;
    }
    .modal-preview {
      width: 150px; height: 150px;
      border-radius: 18px; background: #f5f5f5;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .modal-preview img { width: 85%; height: 85%; object-fit: contain; }
    .modal-label {
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 900; color: #1a1a1a; text-align: center;
      margin: 0;
    }
    .modal-apply-btn {
      width: 100%; padding: 16px;
      border-radius: 14px; border: none;
      background: #57cc02; color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.03em;
      box-shadow: 0 4px 0 #46a302; cursor: pointer;
    }
    .modal-apply-btn:active { transform: translateY(4px); box-shadow: none; }
  </style>
</head>

    // ── Asset grids per tab ──
    // Hair images from Figma node 468:23142

      'https://www.figma.com/api/mcp/asset/812fe4da-ec51-461c-b539-450630908388',
      'https://www.figma.com/api/mcp/asset/d5277494-1ea0-452d-ae8d-cc0bfb59fb4a',

    // Body images — local Figma exports (SVG content, renamed from .png)
    const BODY_IMGS = [
      '../Image/figma-assets/image-110.svg',
      '../Image/figma-assets/image-111.svg',
      '../Image/figma-assets/image-112.svg',

    function makeAssets(labels, imgs) {
      return labels.map((label, i) => ({ label, img: imgs ? imgs[i] || '' : '' }));

    const TAB_ASSETS = {
      body:      makeAssets(['Body 1','Body 2','Body 3','Body 4','Body 5','Body 6'], BODY_IMGS),
      eyes:      makeAssets(['Eyes 1','Eyes 2','Eyes 3','Eyes 4','Eyes 5','Eyes 6'], null),
      hair:      makeAssets(['Hair 1','Hair 2','Hair 3','Hair 4','Hair 5','Hair 6'], HAIR_IMGS),
      glasses:   makeAssets(['Frame 1','Frame 2','Frame 3','Frame 4','Frame 5','Frame 6'], null),
      mask:      makeAssets(['Mask 1','Mask 2','Mask 3','Mask 4','Mask 5','Mask 6'], null),
      templates: makeAssets(['Style 1','Style 2','Style 3','Style 4','Style 5','Style 6'], null),
    };

    // ── Hair SVG paths (6 styles, viewBox 0 0 200 210) ──
    const HAIR_PATHS = [
      // 0: short swept-right
      'M50,85 Q52,32 100,29 Q148,32 150,85 Q135,60 100,63 Q65,60 50,85 Z',
      // 1: medium parted
      'M46,90 Q46,24 100,22 Q154,24 154,90 Q145,58 120,54 Q108,50 100,52 Q92,50 80,54 Q55,58 46,90 Z',
      // 2: shorter/tapered sides
      'M54,80 Q55,36 100,32 Q145,36 146,80 Q135,62 100,65 Q65,62 54,80 Z',
      // 3: wavy long
      'M44,95 Q40,26 100,22 Q160,26 156,95 Q148,68 128,62 Q114,58 100,60 Q86,58 72,62 Q52,68 44,95 Z',
      // 4: swept left / side parted
      'M48,86 Q47,28 100,25 Q153,28 152,86 Q140,58 110,54 Q96,52 48,86 Z',
      // 5: flat-top boxy
      'M50,72 L50,38 Q50,24 100,24 Q150,24 150,38 L150,72 Q132,58 100,60 Q68,58 50,72 Z',
    ];

    // ── Body SVG shapes (6 styles, viewBox 0 0 200 210) ──
    // __C__ = body color, __D__ = darker shade for collar stroke
    const BODY_SHAPES = [
      // 0: Standard — balanced proportions
      `<rect x="48" y="132" width="104" height="78" rx="22" fill="__C__"/>
       <path d="M80,132 Q100,148 120,132" fill="__C__" stroke="__D__" stroke-width="1"/>
       <ellipse cx="32" cy="156" rx="22" ry="13" fill="__C__"/>
       <ellipse cx="168" cy="156" rx="22" ry="13" fill="__C__"/>`,
      // 1: Slim — narrow torso and thin arms
      `<rect x="64" y="130" width="72" height="80" rx="16" fill="__C__"/>
       <path d="M84,130 Q100,144 116,130" fill="__C__" stroke="__D__" stroke-width="1"/>
       <ellipse cx="42" cy="152" rx="18" ry="10" fill="__C__"/>
       <ellipse cx="158" cy="152" rx="18" ry="10" fill="__C__"/>`,
      // 2: Stocky — wide and short torso
      `<rect x="30" y="136" width="140" height="66" rx="28" fill="__C__"/>
       <path d="M70,136 Q100,152 130,136" fill="__C__" stroke="__D__" stroke-width="1"/>
       <ellipse cx="16" cy="162" rx="28" ry="17" fill="__C__"/>
       <ellipse cx="184" cy="162" rx="28" ry="17" fill="__C__"/>`,
      // 3: Round/Chubby — wide rounded belly
      `<path d="M60,132 Q24,132 24,170 Q24,210 100,210 Q176,210 176,170 Q176,132 140,132 Z" fill="__C__"/>
       <path d="M76,132 Q100,154 124,132" fill="__C__" stroke="__D__" stroke-width="1"/>
       <ellipse cx="18" cy="166" rx="24" ry="16" fill="__C__"/>
       <ellipse cx="182" cy="166" rx="24" ry="16" fill="__C__"/>`,
      // 4: Athletic — wide shoulders tapering to waist
      `<path d="M36,132 L164,132 Q170,150 154,180 Q138,210 100,210 Q62,210 46,180 Q30,150 36,132 Z" fill="__C__"/>
       <path d="M72,132 Q100,148 128,132" fill="__C__" stroke="__D__" stroke-width="1"/>
       <ellipse cx="22" cy="150" rx="26" ry="14" fill="__C__"/>
       <ellipse cx="178" cy="150" rx="26" ry="14" fill="__C__"/>`,
      // 5: Pear — narrow shoulders, wider hips
      `<path d="M72,132 Q46,132 42,152 Q34,174 46,194 Q58,210 100,210 Q142,210 154,194 Q166,174 158,152 Q154,132 128,132 Z" fill="__C__"/>
       <path d="M82,132 Q100,146 118,132" fill="__C__" stroke="__D__" stroke-width="1"/>
       <ellipse cx="34" cy="152" rx="20" ry="12" fill="__C__"/>
       <ellipse cx="166" cy="152" rx="20" ry="12" fill="__C__"/>`,
    ];

    function darken(hex) {
      return '#' + hex.replace(/^#/, '').match(/.{2}/g)
        .map(h => Math.max(0, parseInt(h, 16) - 40).toString(16).padStart(2, '0'))
        .join('');
    }

    // ── Eye shape thumbnail SVGs (single centred eye, viewBox 0 0 40 30) ──
    // Used only for the grid preview; rendered with the selected eye color.
    const EYE_SHAPES = [
      // 0: round — classic circle
      '<ellipse cx="20" cy="15" rx="9" ry="10" fill="white" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="20" cy="16" r="6" fill="__C__"/><circle cx="18" cy="13" r="2.5" fill="white"/>',
      // 1: wide — surprised big eyes
      '<ellipse cx="20" cy="15" rx="11" ry="12" fill="white" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="20" cy="16" r="7" fill="__C__"/><circle cx="17" cy="13" r="3" fill="white"/>',
      // 2: narrow — squinting, relaxed
      '<ellipse cx="20" cy="15" rx="9" ry="6" fill="white" stroke="#d9d9d9" stroke-width="1.5"/><ellipse cx="20" cy="15" rx="5" ry="4" fill="__C__"/><circle cx="18" cy="14" r="1.5" fill="white"/>',
      // 3: cute — large iris, sparkling
      '<ellipse cx="20" cy="15" rx="10" ry="11" fill="white" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="20" cy="16" r="8" fill="__C__"/><circle cx="17" cy="12" r="3.5" fill="white"/><circle cx="23" cy="18" r="1.5" fill="white"/>',
      // 4: sleepy — half-lidded
      '<ellipse cx="20" cy="15" rx="9" ry="10" fill="white" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="20" cy="16" r="6" fill="__C__"/><circle cx="18" cy="13" r="2.5" fill="white"/><path d="M11,12 Q20,8 29,12" fill="#e39765" stroke="#e39765" stroke-width="1"/>',
      // 5: sparkle — star-shaped shine
      '<ellipse cx="20" cy="15" rx="9" ry="10" fill="white" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="20" cy="16" r="6" fill="__C__"/><path d="M20,10 L21,14 L25,14 L22,16 L23,20 L20,18 L17,20 L18,16 L15,14 L19,14 Z" fill="white" opacity="0.8"/>',
    ];

    // Glasses SVG paths (overlay on face)
    // Eyes at cx=84 and cx=116. Lenses are centered on those positions.
    // Left lens: outer x=71, inner x=97. Right lens: inner x=103, outer x=129.
    // Bridge: x=97–103. Temple arms extend outward from outer edges.
    const GLASSES_PATHS = [
      // 0: round circles centered on each eye
      'M71,88 a13,13 0 1,0 26,0 a13,13 0 1,0 -26,0 M103,88 a13,13 0 1,0 26,0 a13,13 0 1,0 -26,0 M97,88 L103,88 M71,88 L54,82 M129,88 L146,82',
      // 1: square frames centered on each eye
      'M71,78 h26 v20 h-26 Z M103,78 h26 v20 h-26 Z M97,88 L103,88 M71,88 L54,82 M129,88 L146,82',
      // 2: narrow oval (flat) centered on each eye
      'M71,88 a13,8 0 1,0 26,0 a13,8 0 1,0 -26,0 M103,88 a13,8 0 1,0 26,0 a13,8 0 1,0 -26,0 M97,88 L103,88 M71,88 L54,82 M129,88 L146,82',
      // 3: cat-eye with lifted outer corners
      'M71,92 Q74,78 97,81 Q97,95 84,97 Q71,95 71,92 Z M103,81 Q126,78 129,92 Q129,95 116,97 Q103,95 103,81 Z M97,88 L103,88 M71,91 L54,84 M129,91 L146,84',
      // 4: half-rim (open top)
      'M71,88 a13,13 0 0,0 26,0 L71,88 M103,88 a13,13 0 0,0 26,0 L103,88 M97,88 L103,88 M71,88 L54,82 M129,88 L146,82',
      // 5: heart-shaped funky lenses
      'M84,83 Q78,75 72,81 Q72,93 84,96 Q96,93 96,81 Q90,75 84,83 Z M116,83 Q110,75 104,81 Q104,93 116,96 Q128,93 128,81 Q122,75 116,83 Z M96,90 L104,90 M72,87 L54,82 M128,87 L146,82',
    ];

    // ── Render functions ──
    function renderColors() {
      const colors = TAB_COLORS[activeTab] || [];
      document.getElementById('colorsRow').innerHTML = colors.map((c, i) => {
        const sel = selectedColorIdx[activeTab] === i;
        const bStyle = c.border ? `border-color:${c.border};` : '';
        return `<div class="color-swatch${sel ? ' selected' : ''}"
          style="background:${c.hex};${bStyle}"
          onclick="pickColor(${i})"
          ondblclick="openColorModal(${i})"
          title="${c.label}"></div>`;
      }).join('');
    }

    function renderGrid() {
      const assets = TAB_ASSETS[activeTab] || [];
      const label = { body:'Body', eyes:'Eyes', hair:'Hair', glasses:'Glasses', mask:'Face', templates:'Templates' }[activeTab];
      document.getElementById('assetLabel').textContent = label;
      document.getElementById('assetGrid').innerHTML = assets.map((asset, i) => {
        const sel = selectedAssetIdx[activeTab] === i;
        let inner;
        if (activeTab === 'body') {
          // Inline SVG thumbnail of each body shape using BODY_SHAPES
          const bodyColor = TAB_COLORS.body[selectedColorIdx.body].hex;
          const tmpl = BODY_SHAPES[i] || BODY_SHAPES[0];
          const content = tmpl.replace(/__C__/g, bodyColor).replace(/__D__/g, darken(bodyColor));
          inner = `<svg viewBox="14 128 172 84" width="90%" height="90%" xmlns="http://www.w3.org/2000/svg">${content}</svg>`;
        } else if (activeTab === 'eyes') {
          // Inline SVG thumbnail of each eye shape using EYE_SHAPES
          const eyeColor = TAB_COLORS.eyes[selectedColorIdx.eyes].hex;
          const eyeContent = (EYE_SHAPES[i] || EYE_SHAPES[0]).replace(/__C__/g, eyeColor);
          inner = `<svg viewBox="0 0 40 30" width="90%" height="90%" xmlns="http://www.w3.org/2000/svg">${eyeContent}</svg>`;
        } else if (activeTab === 'glasses') {
          // Inline SVG thumbnail of each glasses frame using GLASSES_PATHS
          const gColor = TAB_COLORS.glasses[selectedColorIdx.glasses].hex;
          const gPath = GLASSES_PATHS[i] || GLASSES_PATHS[0];
          inner = `<svg viewBox="54 76 92 26" width="90%" height="90%" xmlns="http://www.w3.org/2000/svg">
            <path d="${gPath}" stroke="${gColor}" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>`;
        } else if (asset.img) {
          inner = `<img src="${asset.img}" alt="${asset.label}">`;
        } else {
          inner = `<div class="asset-cell-placeholder"><svg viewBox="0 0 40 40" width="36" height="36"><text x="20" y="24" font-size="9" text-anchor="middle" fill="#afafaf" font-family="Nunito,sans-serif">${asset.label}</text></svg></div>`;
        }
        return `<div class="asset-cell${sel ? ' selected' : ''}"
          onclick="pickAsset(${i})"
          ondblclick="openAssetModal(${i})">${inner}</div>`;
      }).join('');
    }

    // ── Character preview update ──
    function updatePreview() {
      const hairColor = TAB_COLORS.hair[selectedColorIdx.hair].hex;
      const bodyColor = TAB_COLORS.body[selectedColorIdx.body].hex;
      const hairIdx   = selectedAssetIdx.hair;
      const bodyIdx   = selectedAssetIdx.body;

      // Hair: draw SVG path in selected style + color
      const hairPath = HAIR_PATHS[hairIdx] || HAIR_PATHS[0];
      document.getElementById('hairGroup').innerHTML =
        `<path d="${hairPath}" fill="${hairColor}"/>`;

      // Body shape + color
      const bodyTemplate = BODY_SHAPES[bodyIdx] || BODY_SHAPES[0];
      document.getElementById('bodyGroup').innerHTML =
        bodyTemplate.replace(/__C__/g, bodyColor).replace(/__D__/g, darken(bodyColor));

      // Glasses overlay
      const glassesG = document.getElementById('glassesGroup');
      if (selectedAssetIdx.glasses > 0 || activeTab === 'glasses') {
        const gColor = TAB_COLORS.glasses[selectedColorIdx.glasses].hex;
        const gPath  = GLASSES_PATHS[selectedAssetIdx.glasses] || GLASSES_PATHS[0];
        glassesG.setAttribute('display', 'block');
        glassesG.innerHTML = `<path d="${gPath}" stroke="${gColor}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
      } else {
        glassesG.setAttribute('display', 'none');
      }
    }

    // ── Interactions ──
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.tab === tab));
      renderColors();
      renderGrid();
      updatePreview();
    }

    function pickColor(idx) {
      selectedColorIdx[activeTab] = idx;
      renderColors();
      renderGrid();
      updatePreview();
    }

    function pickAsset(idx) {
      selectedAssetIdx[activeTab] = idx;
      renderGrid();
      updatePreview();
    }

    function resetToDefaults() {
      selectedAssetIdx[activeTab] = 0;
      selectedColorIdx[activeTab] = 0;
      renderColors();
      renderGrid();
      updatePreview();
    }

    // ── Modal ──
    function openColorModal(idx) {
      const c = TAB_COLORS[activeTab][idx];
      document.getElementById('modalPreview').innerHTML =
        `<div style="width:120px;height:120px;border-radius:16px;background:${c.hex};${c.border ? `border:2px solid ${c.border}` : ''}"></div>`;
      document.getElementById('modalLabel').textContent = c.label;
      pendingApply = () => pickColor(idx);
      document.getElementById('modalApplyBtn').onclick = () => { pendingApply && pendingApply(); closeModal(); };
      document.getElementById('assetModal').classList.add('open');
    }

    function openAssetModal(idx) {
      const asset = TAB_ASSETS[activeTab][idx];
      document.getElementById('modalPreview').innerHTML = asset.img
        ? `<img src="${asset.img}" alt="${asset.label}" style="width:130px;height:130px;object-fit:contain;">`
        : `<div style="width:120px;height:120px;background:#f0f0f0;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif;font-size:12px;color:#afafaf;">${asset.label}</div>`;
      document.getElementById('modalLabel').textContent = asset.label;
      pendingApply = () => pickAsset(idx);
      document.getElementById('modalApplyBtn').onclick = () => { pendingApply && pendingApply(); closeModal(); };
      document.getElementById('assetModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('assetModal').classList.remove('open');
      pendingApply = null;
    }

    // ── Init ──
    renderColors();
    renderGrid();
    updatePreview();
  </script>
</body>
</html>
