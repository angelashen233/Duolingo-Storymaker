<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Screen 06 — Preview Your Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../duolingo-design.css">
  <link rel="stylesheet" href="../design-system.css">
  <link rel="stylesheet" href="../components/animations.css">
  <link rel="stylesheet" href="../components/character.css">
  <link rel="stylesheet" href="../components/dialogue-bubble.css">
  <link rel="stylesheet" href="../components/duo-button.css">
  <style>
    body.demo-page { background: linear-gradient(160deg,#0F2027,#203A43,#2C5364); }

    /* Preview mode banner */
    .preview-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 8px; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
    }
    .preview-tag {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,200,0,0.25); color: #FFD700;
      font-size: 12px; font-weight: 900; padding: 4px 12px;
      border-radius: 9999px; letter-spacing: 0.05em; text-transform: uppercase;
      border: 1.5px solid rgba(255,200,0,0.4);
    }
    .preview-close {
      color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 800;
      background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
      padding: 6px 14px; border-radius: 9999px; cursor: pointer; text-decoration: none;
    }

    /* Progress bar (chapter indicator) */
    .story-progress {
      padding: 8px 16px 4px; background: rgba(0,0,0,0.2);
    }
    .progress-chapter {
      display: flex; justify-content: space-between;
      font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.6);
      margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .scene-dots { display: flex; gap: 6px; justify-content: center; margin-top: 6px; }
    .scene-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); }
    .scene-dot.active { background: var(--color-feather-green); width: 24px; border-radius: 4px; }
    .scene-dot.done { background: rgba(88,204,2,0.5); }

    /* Full-screen scene */
    .player-scene {
      flex: 1; position: relative; overflow: hidden;
      background: linear-gradient(180deg,#87CEEB 0%,#B0E0FF 50%,#E8F5D4 70%,#C8E89A 100%);
      min-height: 280px;
    }
    .player-sun { position: absolute; top: 16px; right: 24px; font-size: 36px; }
    .player-cloud-1 { position: absolute; top: 22px; left: 16px; font-size: 24px; opacity: 0.8; animation: bob 6s ease-in-out infinite; }
    .player-cloud-2 { position: absolute; top: 36px; left: 70px; font-size: 18px; opacity: 0.6; animation: bob 4s 1s ease-in-out infinite; }
    .player-floor { position: absolute; bottom: 0; left: 0; right: 0; height: 48px; background: rgba(80,140,60,0.25); }
    .player-char-left  { position: absolute; bottom: 12px; left: 24px; }
    .player-char-right { position: absolute; bottom: 12px; right: 24px; transform: scaleX(-1); }

    /* Dialogue card */
    .dialogue-card {
      margin: 0 14px 8px; background: white; border-radius: 20px;
      padding: 16px 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .dialogue-speaker-label {
      font-size: 12px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--color-cardinal); margin-bottom: 6px;
      display: flex; align-items: center; gap: 7px;
    }
    .speaker-dot { width: 8px; height: 8px; border-radius: 50%; }
    .speaker-dot-lily { background: var(--color-cardinal); }
    .dialogue-line {
      font-size: 18px; font-weight: 700; color: var(--color-eel);
      line-height: 1.5;
    }
    .translation-line {
      font-size: 13px; font-weight: 600; color: var(--color-wolf);
      font-style: italic; margin-top: 4px;
    }

    /* Choice buttons */
    .player-choices { padding: 0 14px 12px; display: flex; flex-direction: column; gap: 8px; }
    .player-choice {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: white;
      border: 2.5px solid var(--color-swan); border-radius: var(--radius-lg);
      cursor: pointer; transition: all 120ms ease;
      box-shadow: 0 3px 0 var(--color-swan);
      text-decoration: none; color: var(--color-eel);
      font-family: 'Nunito', sans-serif;
    }
    .player-choice:hover { border-color: var(--color-macaw); box-shadow: 0 3px 0 #0E8FCD; }
    .player-choice:active { transform: translateY(3px); box-shadow: none; }
    .player-choice.picked { border-color: var(--color-feather-green); background: rgba(88,204,2,0.06); box-shadow: 0 3px 0 #46A302; }
    .player-choice-letter {
      width: 28px; height: 28px; border-radius: 50%; background: var(--color-polar);
      border: 2px solid var(--color-swan); font-size: 13px; font-weight: 900;
      color: var(--color-wolf); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 120ms ease;
    }
    .player-choice:hover .player-choice-letter,
    .player-choice.picked .player-choice-letter { background: var(--color-feather-green); border-color: var(--color-feather-green); color: white; }
    .player-choice-text { font-size: 15px; font-weight: 700; line-height: 1.4; }

    /* Tap to continue */
    .tap-continue {
      text-align: center; padding: 4px 0 12px;
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4);
      animation: blink-cursor 2s ease-in-out infinite;
    }

    /* XP counter corner */
    .xp-corner {
      position: absolute; top: 60px; right: 14px;
      background: rgba(255,200,0,0.2); border: 1.5px solid rgba(255,200,0,0.4);
      color: #FFD700; font-size: 12px; font-weight: 800;
      padding: 4px 10px; border-radius: 9999px; backdrop-filter: blur(4px);
    }
  </style>
</head>
<body class="demo-page">
  <div class="phone" style="background:linear-gradient(180deg,#1A2F3F 0%,#152030 100%);">
    <!-- Status bar -->
    <div class="status-bar" style="background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);">
      <span class="status-time" style="color:rgba(255,255,255,0.9);">9:41</span>
      <div class="status-icons" style="color:rgba(255,255,255,0.8);">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="white"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="white"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="white"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="white" stroke-width="1.5" fill="none"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="white" opacity="0.5"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="white"/></svg>
      </div>
    </div>

    <main class="screen" style="display:flex;flex-direction:column;background:transparent;" id="playerMain">

      <!-- Preview banner -->
      <div class="preview-banner">
        <span class="preview-tag">👁 Preview Mode</span>
        <a href="03-new-storyboard.html" class="preview-close">✕ Exit</a>
      </div>

      <!-- Progress dots -->
      <div class="story-progress">
        <div class="progress-chapter">
          <span>Mi Familia es Loca</span>
          <span>Scene 2 of 6</span>
        </div>
        <div style="height:4px;background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;">
          <div style="width:33%;height:100%;background:var(--color-feather-green);border-radius:9999px;transition:width 400ms ease;"></div>
        </div>
        <div class="scene-dots">
          <div class="scene-dot done"></div>
          <div class="scene-dot done"></div>
          <div class="scene-dot active"></div>
          <div class="scene-dot"></div>
          <div class="scene-dot"></div>
          <div class="scene-dot"></div>
        </div>
      </div>

      <!-- Scene -->
      <div class="player-scene scene-reveal">
        <div class="player-sun">☀️</div>
        <div class="player-cloud-1">☁️</div>
        <div class="player-cloud-2">☁️</div>
        <div class="player-floor"></div>
        <div class="player-char-left">
          <div data-char="duo" data-size="char-lg" style="animation:bob 3s ease-in-out infinite;"></div>
        </div>
        <div class="player-char-right">
          <div data-char="lily" data-size="char-xl" class="char-speaking"></div>
        </div>
        <!-- XP corner -->
        <div class="xp-corner">+5 XP 🌟</div>
      </div>

      <!-- Dialogue -->
      <div class="dialogue-card bubble-appear" id="dialogueCard">
        <div class="dialogue-speaker-label">
          <div class="speaker-dot speaker-dot-lily"></div>
          Lily
        </div>
        <div class="dialogue-line" id="dialogueLine">
          ¡Hola! ¿Cómo te llamas?
        </div>
        <div class="translation-line">Hello! What's your name?</div>
      </div>

      <!-- Player choices -->
      <div class="player-choices stagger" id="choicesContainer">
        <div class="player-choice choice-in-1 hotspot" onclick="pickChoice(this, 0)">
          <div class="player-choice-letter">A</div>
          <div class="player-choice-text">Tell her your name</div>
        </div>
        <div class="player-choice choice-in-2" onclick="pickChoice(this, 1)">
          <div class="player-choice-letter">B</div>
          <div class="player-choice-text">Ask her age instead</div>
        </div>
        <div class="player-choice choice-in-3" onclick="pickChoice(this, 2)">
          <div class="player-choice-letter">C</div>
          <div class="player-choice-text">Run away dramatically 🏃</div>
        </div>
      </div>

    </main>
  </div>

  <script src="../js/characters.js"></script>
  <script>
    // Typewriter effect for dialogue
    const dialogue = [
      { speaker: 'Lily', speakerColor: '#FF4B4B', text: '¡Hola! ¿Cómo te llamas?', trans: "Hello! What's your name?" },
      { speaker: 'Duo',  speakerColor: '#2D8A00', text: 'Me llamo... ¡Duo! Y tú, ¿tienes familia aquí?', trans: "My name is... Duo! And you, do you have family here?" },
    ];

    let dialogueIndex = 0;
    let typing = false;

    function typewriterReveal(text, el) {
      el.textContent = '';
      typing = true;
      let i = 0;
      const interval = setInterval(() => {
        el.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          typing = false;
        }
      }, 45);
    }

    // Animate dialogue on load
    window.addEventListener('load', () => {
      const line = document.getElementById('dialogueLine');
      typewriterReveal(dialogue[dialogueIndex].text, line);
    });

    function pickChoice(el, idx) {
      document.querySelectorAll('.player-choice').forEach(c => c.classList.remove('picked'));
      el.classList.add('picked');

      // Brief pause then advance
      setTimeout(() => {
        if (idx === 2) {
          // Dramatic ending — navigate to publish
          window.location.href = '07-publish-flow.html';
        } else {
          window.location.href = '07-publish-flow.html';
        }
      }, 800);
    }
  </script>
  <script>
    document.querySelectorAll('.hotspot').forEach(el => {
      el.addEventListener('click', () => el.classList.add('done'), { once: true });
    });
  </script>
  <a class="home-fab" href="../index.html">🏠 Main Page</a>
</body>
</html>
