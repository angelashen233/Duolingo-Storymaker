<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Screen 04 - Characters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../duolingo-design.css">
  <link rel="stylesheet" href="../design-system.css">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
    }

    .screen.character-screen {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .character-main {
      flex: 1;
      padding: 6px 12px 10px;
    }

    .character-topbar {
      display: grid;
      grid-template-columns: 28px 1fr 28px;
      align-items: center;
      gap: 8px;
      padding: 4px 0 6px;
    }

    .icon-button {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #b8b8b8;
      text-decoration: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
    }

    .screen-title {
      text-align: center;
      margin: 0;
      color: #141414;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .scene-progress {
      margin-bottom: 10px;
    }

    .scene-progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #d6d6d6;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .scene-dots {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 2px;
    }

    .scene-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.8px solid #d5d5d5;
      background: #ffffff;
      position: relative;
      padding: 0;
    }

    .scene-dot.active {
      border-color: #f2cb4d;
    }

    .scene-dot.active::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #f2cb4d;
    }

    .character-stage {
      position: relative;
      height: 260px;
      margin-bottom: 14px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 12% 12%, rgba(122, 212, 255, 0.28), transparent 32%),
        radial-gradient(circle at 88% 20%, rgba(110, 35, 232, 0.1), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, #f5fbff 100%);
      border: 1px solid #edf5fb;
      overflow: hidden;
    }

    .stage-plus {
      position: absolute;
      right: 8px;
      top: 76px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid #62c7ff;
      color: #62c7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-size: 14px;
      font-weight: 800;
    }

    .decor-column {
      position: absolute;
      left: 8px;
      top: 72px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .decor-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border: 1px solid #d6eefb;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(116, 188, 230, 0.12);
    }

    .decor-avatar img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .avatar-stage {
      position: absolute;
      inset: 28px 32px 58px 62px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-frame {
      width: 178px;
      height: 178px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .avatar-glow {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(133, 211, 252, 0.34) 0%, rgba(133, 211, 252, 0.08) 55%, transparent 74%);
    }

    .avatar-preview {
      position: relative;
      width: 150px;
      height: 150px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(77, 171, 225, 0.18);
      background: linear-gradient(180deg, #f8fdff 0%, #eff7fd 100%);
    }

    .avatar-preview img {
      width: 136px;
      height: 136px;
      object-fit: contain;
    }

    .category-tabs {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 12px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .category-tab {
      height: 32px;
      border-radius: 11px;
      border: 1.5px solid #d9f0fa;
      background: #ffffff;
      color: #89bfd9;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      box-shadow: 0 2px 0 #ebf6fb;
    }

    .category-tab.active {
      border-color: #8ad9ff;
      background: #f1fbff;
      color: #47baf4;
    }

    .category-tab svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .swatch-row {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 7px;
      border: 1.5px solid #ebebeb;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
      cursor: pointer;
      position: relative;
    }

    .swatch.active {
      outline: 2px solid #58c7ff;
      outline-offset: 2px;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .option-card {
      aspect-ratio: 1;
      border-radius: 12px;
      border: 1.5px solid #ededed;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 2px 0 #f0f0f0;
    }

    .option-card.active {
      border-color: #83d8ff;
      background: #f3fbff;
    }

    .option-card img {
      width: 54px;
      height: 54px;
      object-fit: contain;
    }

    .hair-swatch {
      width: 48px;
      height: 28px;
      border-radius: 999px 999px 12px 12px;
      border: 3px solid rgba(0,0,0,0.05);
      border-bottom: none;
    }

    .body-swatch {
      width: 44px;
      height: 54px;
      border-radius: 18px 18px 10px 10px;
      border: 3px solid rgba(255,255,255,0.36);
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.08);
    }

    .option-label {
      position: absolute;
      bottom: 6px;
      left: 0;
      right: 0;
      text-align: center;
      color: #a5a5a5;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .cta-bar {
      padding: 2px 12px 10px;
    }

    .cta-button {
      width: 100%;
      min-height: 44px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #8c3bff 0%, #6e23e8 100%);
      color: #ffffff;
      font: 900 14px/1 'Nunito', sans-serif;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 0 #5618b8;
      cursor: pointer;
    }

    .cta-button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #5618b8;
    }

    .bottom-nav.figma-nav {
      background: #ffffff;
      border-top: 1px solid #ece6f5;
      padding-top: 8px;
    }

    .figma-nav .nav-item {
      color: #b6aecb;
      gap: 5px;
    }

    .figma-nav .nav-item:nth-child(1) { color: var(--studio-figma-nav-home); }
    .figma-nav .nav-item:nth-child(2) { color: var(--studio-figma-nav-studio); }
    .figma-nav .nav-item:nth-child(3) { color: var(--studio-figma-nav-learn); }
    .figma-nav .nav-item:nth-child(4) { color: var(--studio-figma-nav-create); }
    .figma-nav .nav-item:nth-child(5) { color: var(--studio-figma-nav-social); }
    .figma-nav .nav-item:nth-child(6) { color: var(--studio-figma-nav-profile); }

    .figma-nav .nav-item.active {
      transform: translateY(-2px);
      font-weight: 900;
    }

    .figma-nav .nav-label {
      font-size: 10px;
      font-weight: 900;
    }

    .figma-nav .nav-icon svg {
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body class="demo-page">
  <div class="phone">
    <div class="status-bar" style="background:#ffffff;">
      <span class="status-time">9:27</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><circle cx="8" cy="10.5" r="1.5" fill="currentColor"/><path d="M8 6C6.2 6 4.6 6.8 3.4 8L2.4 7C3.9 5.5 5.8 4.6 8 4.6s4.1.9 5.6 2.4L12.6 8C11.4 6.8 9.8 6 8 6z" fill="currentColor"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="currentColor"/></svg>
      </div>

    <main class="screen character-screen">
      <div class="character-main">
        <header class="character-topbar">
          <a class="icon-button" href="03-new-storyboard.html" aria-label="Close character screen">×</a>

        <section class="scene-progress" aria-label="Scene progress">
          <div class="scene-progress-head">
            <span>Scene</span>

          <div class="scene-dots">
            <span class="scene-dot active" aria-hidden="true"></span>

            <span class="scene-dot" aria-hidden="true"></span>

        <section class="character-stage">

              <svg viewBox="0 0 24 24"><path d="M5 14c0-5 3.2-8 7-8s7 3 7 8"></path><path d="M7 14v1.5c0 2.5 2.2 4.5 5 4.5s5-2 5-4.5V14"></path><path d="M9 10c.7 1 1.8 1.7 3 2 1.2-.3 2.3-1 3-2"></path></svg>

          <span class="nav-label">Cards</span>

        <a class="nav-item" href="01-duolingo-home-new-tab.html">
          <div class="nav-icon"><img class="nav-asset" src="../Image/figma-assets/Bottom Nav Button-left3-dumbell.png" alt="" /></div>

          <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M4 18h16"/><path d="M5 7h7l2 2h5v7H5z"/><path d="M9 7V4"/><path d="M13 7V4"/></svg></div>
          <span class="nav-label">Studio</span>

        </a>
        <a class="nav-item" href="#">
          <div class="nav-icon"><img class="nav-asset" src="../Image/figma-assets/Profile-left-6.png" alt="" /></div>
          <span class="nav-label">Profile</span>
        </a>
      </nav>
    </main>
  </div>

  <script>
    const characterState = {
      activeCategory: 'body',
      activeSwatchIndex: 0,
      selected: {
        body: 'default-body',
        hair: 'hair-blue-bob',
        shirt: 'shirt-green',
        pants: 'pants-purple',
        accent: 'accent-gold'
      }
    };

    const categoryConfig = {
      body: {
        swatches: ['#4fd0ff', '#62d54b', '#ffd449', '#ff9a00', '#ffffff', '#f5e6d4', '#d0a17c', '#8a5c3d'],
        options: [
          { id: 'default-body', type: 'image', src: '../Image/figma-assets/user-character-profie-image.png', label: 'base' },
          { id: 'body-bob', type: 'image', src: '../Image/figma-assets/bob-character-user-profile-image.png', label: 'bob' },
          { id: 'body-brown', type: 'image', src: '../Image/figma-assets/brown-character-profile.png', label: 'warm' },
          { id: 'body-neutral', type: 'image', src: '../Image/figma-assets/neutral-character.png', label: 'soft' },
          { id: 'body-smile', type: 'image', src: '../Image/figma-assets/Happy-actor.png', label: 'smile' },
          { id: 'body-curious', type: 'image', src: '../Image/figma-assets/actor-slight-surprise.png', label: 'curious' },
          { id: 'body-nervous', type: 'image', src: '../Image/figma-assets/Actor-nervous.png', label: 'nervous' },
          { id: 'body-scared', type: 'image', src: '../Image/figma-assets/Actor-scared-sweating.png', label: 'scared' }
        ]
      },
      hair: {
        swatches: ['#1a56d9', '#6339bb', '#542d15', '#8b4b2a', '#151515', '#bc8cff', '#ff5b2e', '#ffffff'],
        options: [
          { id: 'hair-blue-bob', type: 'shape', color: '#1a56d9', label: 'bob' },
          { id: 'hair-violet-wave', type: 'shape', color: '#6339bb', label: 'wave' },
          { id: 'hair-brown-curl', type: 'shape', color: '#8b4b2a', label: 'curl' },
          { id: 'hair-dark-cap', type: 'shape', color: '#151515', label: 'short' },
          { id: 'hair-lilac', type: 'shape', color: '#bc8cff', label: 'soft' },
          { id: 'hair-orange', type: 'shape', color: '#ff5b2e', label: 'bold' },
          { id: 'hair-cream', type: 'shape', color: '#f5efe5', label: 'light' },
          { id: 'hair-umber', type: 'shape', color: '#542d15', label: 'deep' }
        ]
      },
      shirt: {
        swatches: ['#31d200', '#23b6ff', '#ffd53f', '#ff8b00', '#6e23e8', '#e84d4d', '#ffffff', '#101010'],
        options: [
          { id: 'shirt-green', type: 'body-color', color: '#31d200', label: 'lime' },
          { id: 'shirt-cyan', type: 'body-color', color: '#23b6ff', label: 'cyan' },
          { id: 'shirt-yellow', type: 'body-color', color: '#ffd53f', label: 'gold' },
          { id: 'shirt-orange', type: 'body-color', color: '#ff8b00', label: 'orange' },
          { id: 'shirt-purple', type: 'body-color', color: '#6e23e8', label: 'violet' },
          { id: 'shirt-red', type: 'body-color', color: '#e84d4d', label: 'red' },
          { id: 'shirt-white', type: 'body-color', color: '#ffffff', label: 'white' },
          { id: 'shirt-black', type: 'body-color', color: '#101010', label: 'black' }
        ]
      },
      pants: {
        swatches: ['#f2efe6', '#d3c4a6', '#6e23e8', '#cb2959', '#0f0f3a', '#5f0d0d', '#d2c8ff', '#ebebeb'],
        options: [
          { id: 'pants-cream', type: 'body-color', color: '#f2efe6', label: 'cream' },
          { id: 'pants-sand', type: 'body-color', color: '#d3c4a6', label: 'sand' },
          { id: 'pants-purple', type: 'body-color', color: '#6e23e8', label: 'purple' },
          { id: 'pants-berry', type: 'body-color', color: '#cb2959', label: 'berry' },
          { id: 'pants-navy', type: 'body-color', color: '#0f0f3a', label: 'navy' },
          { id: 'pants-maroon', type: 'body-color', color: '#5f0d0d', label: 'maroon' },
          { id: 'pants-lilac', type: 'body-color', color: '#d2c8ff', label: 'lilac' },
          { id: 'pants-grey', type: 'body-color', color: '#ebebeb', label: 'grey' }
        ]
      },
      accent: {
        swatches: ['#ffdc3f', '#8bc6ff', '#ff69b4', '#7ed957', '#ff9f1c', '#ffffff', '#d8d8d8', '#101010'],
        options: [
          { id: 'accent-gold', type: 'image', src: '../Image/figma-assets/Star-yellow.png', label: 'star' },
          { id: 'accent-fruit', type: 'image', src: '../Image/figma-assets/Fruits-apple-banna-blueberry.png', label: 'fruit' },
          { id: 'accent-duo', type: 'image', src: '../Image/figma-assets/Duolingo-bird-reading.png', label: 'duo' },
          { id: 'accent-confident', type: 'image', src: '../Image/figma-assets/Black-character-confident.png', label: 'hero' },
          { id: 'accent-feed', type: 'image', src: '../Image/figma-assets/feed-friend-profile-image.png', label: 'friend' },
          { id: 'accent-french', type: 'image', src: '../Image/figma-assets/French-flag-icon.png', label: 'flag' },
          { id: 'accent-award', type: 'image', src: '../Image/figma-assets/best story-teller-awards-icon.png', label: 'award' },
          { id: 'accent-badge', type: 'image', src: '../Image/figma-assets/Card Background-for buttons.png', label: 'badge' }
        ]
      }
    };

    const previewMap = {
      'default-body': '../Image/figma-assets/user-character-profie-image.png',
      'body-bob': '../Image/figma-assets/bob-character-user-profile-image.png',
      'body-brown': '../Image/figma-assets/brown-character-profile.png',
      'body-neutral': '../Image/figma-assets/neutral-character.png',
      'body-smile': '../Image/figma-assets/Happy-actor.png',
      'body-curious': '../Image/figma-assets/actor-slight-surprise.png',
      'body-nervous': '../Image/figma-assets/Actor-nervous.png',
      'body-scared': '../Image/figma-assets/Actor-scared-sweating.png'
    };

    const swatchRow = document.getElementById('swatchRow');
    const optionGrid = document.getElementById('optionGrid');
    const categoryTabs = Array.from(document.querySelectorAll('.category-tab'));
    const avatarPreview = document.getElementById('avatarPreview');
    const decorColumn = document.getElementById('decorColumn');
    const saveCharacterButton = document.getElementById('saveCharacterButton');

    function renderDecorColumn() {
      const previewIds = ['default-body', 'body-bob', 'body-brown', 'body-neutral'];
      decorColumn.innerHTML = previewIds.map((id) => `
        <div class="decor-avatar"><img src="${previewMap[id]}" alt="" aria-hidden="true"></div>
      `).join('');
    }

    function renderPreview() {
      const selectedBody = characterState.selected.body;
      avatarPreview.innerHTML = `<img src="${previewMap[selectedBody]}" alt="Selected character preview">`;
    }

    function renderSwatches() {
      const config = categoryConfig[characterState.activeCategory];
      swatchRow.innerHTML = config.swatches.map((color, index) => `
        <button
          class="swatch${index === characterState.activeSwatchIndex ? ' active' : ''}"
          type="button"
          data-swatch-index="${index}"
          style="background:${color};"
          aria-label="Color ${index + 1}">
        </button>
      `).join('');

      swatchRow.querySelectorAll('.swatch').forEach((button) => {
        button.addEventListener('click', () => {
          characterState.activeSwatchIndex = Number(button.dataset.swatchIndex);
          renderSwatches();
        });
      });
    }

    function renderOptions() {
      const config = categoryConfig[characterState.activeCategory];
      const selectedId = characterState.selected[characterState.activeCategory];

      optionGrid.innerHTML = config.options.map((option) => {
        let content = '';

        if (option.type === 'image') {
          content = `<img src="${option.src}" alt="">`;
        }

        if (option.type === 'shape') {
          content = `<div class="hair-swatch" style="background:${option.color};"></div>`;
        }

        if (option.type === 'body-color') {
          content = `<div class="body-swatch" style="background:${option.color};"></div>`;
        }

        return `
          <button class="option-card${selectedId === option.id ? ' active' : ''}" type="button" data-option-id="${option.id}">
            ${content}
            <span class="option-label">${option.label}</span>
          </button>
        `;
      }).join('');

      optionGrid.querySelectorAll('.option-card').forEach((button) => {
        button.addEventListener('click', () => {
          characterState.selected[characterState.activeCategory] = button.dataset.optionId;
          renderOptions();
          if (characterState.activeCategory === 'body') {
            renderPreview();
          }
        });
      });
    }

    function setCategory(category) {
      characterState.activeCategory = category;
      characterState.activeSwatchIndex = 0;
      categoryTabs.forEach((button) => {
        button.classList.toggle('active', button.dataset.category === category);
      });
      renderSwatches();
      renderOptions();
    }

    categoryTabs.forEach((button) => {
      button.addEventListener('click', () => setCategory(button.dataset.category));
    });

    saveCharacterButton.addEventListener('click', () => {
      const payload = {
        body: characterState.selected.body,
        hair: characterState.selected.hair,
        shirt: characterState.selected.shirt,
        pants: characterState.selected.pants,
        accent: characterState.selected.accent,
        preview: previewMap[characterState.selected.body] || previewMap['default-body']
      };

      localStorage.setItem('storymaker:selectedCharacter', JSON.stringify(payload));
      window.location.href = '03-new-storyboard.html';
    });

    renderDecorColumn();
    renderPreview();
    renderSwatches();
    renderOptions();
  </script>
</body>
</html>
