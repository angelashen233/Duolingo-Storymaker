<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Screen 03 — New Storyboard Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../duolingo-design.css">
  <link rel="stylesheet" href="../design-system.css">
  <link rel="stylesheet" href="../components/animations.css">
  <link rel="stylesheet" href="../components/character.css">
  <link rel="stylesheet" href="../components/dialogue-bubble.css">
  <link rel="stylesheet" href="../components/duo-button.css">
  <style>
    /* Canvas editor header */
    .editor-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px 8px; background: white;
      border-bottom: 1.5px solid var(--color-swan);
    }
    .title-input {
      flex: 1; font-family: 'Nunito', sans-serif; font-size: 17px;
      font-weight: 900; color: var(--color-eel); border: none; outline: none;
      background: transparent; min-width: 0;
    }
    .title-input::placeholder { color: var(--color-hare); }

    .header-btn {
      padding: 7px 16px; border-radius: 9999px; border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
    }
    .preview-btn {
      background: var(--color-macaw); color: white;
      box-shadow: 0 3px 0 #149EE0; transition: transform 100ms ease, box-shadow 100ms ease;
    }
    .preview-btn:active { transform: translateY(3px); box-shadow: none; }

    /* Scene canvas */
    .scene-area {
      margin: 10px 12px 0; border-radius: 18px; overflow: hidden;
      height: 264px; position: relative;
      border: 2px solid var(--color-swan);
      background: linear-gradient(180deg, #C5EDFF 0%, #A8D8FF 40%, #D4EDCF 75%, #B8E0B0 100%);
    }
    /* Sun */
    .scene-sun { position: absolute; top: 14px; right: 20px; font-size: 32px; opacity: 0.9; }
    /* Clouds */
    .scene-cloud { position: absolute; top: 20px; font-size: 22px; opacity: 0.75; }
    /* Ground */
    .scene-floor { position: absolute; bottom: 0; left: 0; right: 0; height: 44px; background: rgba(80,140,60,0.2); border-radius: 0 0 16px 16px; }

    /* Characters on stage */
    .char-left { position: absolute; bottom: 12px; left: 18px; }
    .char-right-placeholder {
      position: absolute; bottom: 16px; right: 24px;
      width: 70px; height: 80px; border: 2.5px dashed var(--color-macaw);
      border-radius: 50% 50% 40% 40% / 50% 50% 40% 40%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(28,176,246,0.06); cursor: pointer;
      transition: all 120ms ease;
    }
    .char-right-placeholder:hover { background: rgba(28,176,246,0.12); }
    .char-placeholder-icon { font-size: 22px; }
    .char-placeholder-text { font-size: 10px; font-weight: 800; color: var(--color-macaw); text-align: center; line-height: 1.2; margin-top: 2px; }

    /* Dialogue bubble on stage */
    .stage-bubble {
      position: absolute; top: 14px; left: 88px; right: 20px; max-width: 200px;
    }
    .stage-bubble-box {
      background: white; border: 2px solid var(--color-feather-green);
      border-radius: 14px; padding: 10px 14px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    .stage-bubble-speaker { font-size: 10px; font-weight: 900; color: #2D8A00; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .stage-bubble-text { font-size: 14px; font-weight: 700; color: var(--color-eel); line-height: 1.4; }
    .stage-bubble-tail {
      width: 0; height: 0;
      border-top: 0; border-right: 10px solid transparent;
      border-bottom: 10px solid var(--color-feather-green);
      border-left: 0;
      position: absolute; bottom: -10px; left: 20px;
    }

    /* Scene background picker */
    .bg-picker-row {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 12px; overflow-x: auto; scrollbar-width: none;
    }
    .bg-picker-row::-webkit-scrollbar { display: none; }
    .bg-picker-label { font-size: 11px; font-weight: 800; color: var(--color-wolf); white-space: nowrap; margin-right: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .bg-swatch {
      width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; flex-shrink: 0; transition: transform 100ms ease;
    }
    .bg-swatch.active { border-color: var(--color-eel); transform: scale(1.15); }
    .bg-swatch:hover { transform: scale(1.1); }

    /* Dialogue input area */
    .dialogue-area {
      padding: 8px 12px; background: white; border-top: 1.5px solid var(--color-swan);
    }
    .dialogue-speaker-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .speaker-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--color-swan); }
    .speaker-name { font-size: 13px; font-weight: 800; color: var(--color-feather-green); }
    .speaker-change { font-size: 12px; font-weight: 700; color: var(--color-macaw); cursor: pointer; }
    .dialogue-input-row { display: flex; gap: 8px; align-items: flex-end; }
    .dialogue-field {
      flex: 1; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
      color: var(--color-eel); background: var(--color-polar);
      border: 2px solid var(--color-swan); border-radius: 14px;
      padding: 10px 14px; resize: none; outline: none; min-height: 44px;
      max-height: 96px; line-height: 1.4; transition: border-color 150ms ease;
    }
    .dialogue-field:focus { border-color: var(--color-macaw); background: white; }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--color-feather-green);
      color: white; font-size: 18px; border: none; cursor: pointer; flex-shrink: 0;
      box-shadow: 0 3px 0 #46A302; transition: transform 100ms ease, box-shadow 100ms ease;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:active { transform: translateY(3px); box-shadow: none; }

    /* Bottom toolbar */
    .canvas-toolbar {
      display: flex; align-items: center; gap: 0;
      border-top: 1.5px solid var(--color-swan); background: white;
      padding: 4px 0;
    }
    .tool-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 8px 4px; cursor: pointer; border: none;
      background: transparent; border-radius: 10px; transition: background 120ms ease;
      font-family: 'Nunito', sans-serif;
    }
    .tool-btn:hover { background: var(--color-polar); }
    .tool-btn.active { background: rgba(88,204,2,0.1); }
    .tool-icon { font-size: 20px; }
    .tool-label { font-size: 11px; font-weight: 800; color: var(--color-wolf); }
    .tool-btn.active .tool-label { color: var(--color-feather-green); }

    /* Timeline strip */
    .timeline-strip {
      background: var(--color-polar); border-top: 1.5px solid var(--color-swan);
      padding: 8px 12px;
    }
    .timeline-label { font-size: 11px; font-weight: 800; color: var(--color-wolf); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .timeline-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .timeline-row::-webkit-scrollbar { display: none; }
    .timeline-scene {
      width: 52px; height: 52px; border-radius: 10px; overflow: hidden;
      flex-shrink: 0; border: 3px solid transparent; cursor: pointer; position: relative;
    }
    .timeline-scene.active { border-color: var(--color-macaw); }
    .timeline-scene-inner { width: 100%; height: 100%; display: flex; align-items: flex-end; }
    .timeline-num { position: absolute; top: 3px; left: 3px; background: rgba(0,0,0,0.45); color: white; font-size: 9px; font-weight: 800; padding: 1px 4px; border-radius: 4px; }
    .timeline-add {
      width: 52px; height: 52px; border-radius: 10px; border: 2px dashed var(--color-hare);
      background: transparent; display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--color-hare); cursor: pointer; flex-shrink: 0;
      transition: all 120ms ease;
    }
    .timeline-add:hover { border-color: var(--color-feather-green); color: var(--color-feather-green); background: rgba(88,204,2,0.06); }
  </style>
</head>
<body class="demo-page">
  <div class="phone">
    <div class="status-bar" style="background:white;">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="currentColor"/></svg>
      </div>
    </div>

    <main class="screen" style="display:flex;flex-direction:column;">

      <!-- Editor header -->
      <div class="editor-header">
        <a href="02-studio-landing.html" class="back-btn" style="text-decoration:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <input class="title-input" type="text" value="Mi Familia es Loca" placeholder="Story title...">
        <a href="06-preview-story.html" class="header-btn preview-btn">▶ Preview</a>
      </div>

      <!-- Scene canvas -->
      <div class="scene-area" id="sceneCanvas">
        <div class="scene-sun">☀️</div>
        <div class="scene-cloud" style="left:20px;">☁️</div>
        <div class="scene-cloud" style="left:80px;top:30px;font-size:16px;">☁️</div>
        <div class="scene-floor"></div>

        <!-- Dialogue bubble (Duo speaking) -->
        <div class="stage-bubble slide-up">
          <div class="stage-bubble-box bubble-duo">
            <div class="stage-bubble-speaker">Duo</div>
            <div class="stage-bubble-text">¡Hola! ¿Cómo te llamas?</div>
          </div>
        </div>

        <!-- Duo character on left -->
        <div class="char-left char-bounce-in">
          <div data-char="duo" data-size="char-lg"></div>
        </div>

        <!-- Right character placeholder -->
        <a href="04-character-picker.html" class="char-right-placeholder">
          <span class="char-placeholder-icon">👤</span>
          <span class="char-placeholder-text">Add character</span>
        </a>
      </div>

      <!-- Scene BG picker -->
      <div class="bg-picker-row">
        <span class="bg-picker-label">Scene:</span>
        <div class="bg-swatch active" style="background:linear-gradient(135deg,#C5EDFF,#B8E0B0)" onclick="setBg(this,'park')"></div>
        <div class="bg-swatch" style="background:linear-gradient(135deg,#FFF4E8,#C49A6C)" onclick="setBg(this,'cafe')"></div>
        <div class="bg-swatch" style="background:linear-gradient(135deg,#8EC5FC,#7986CB)" onclick="setBg(this,'city')"></div>
        <div class="bg-swatch" style="background:linear-gradient(135deg,#FFF8E7,#D4A860)" onclick="setBg(this,'home')"></div>
        <div class="bg-swatch" style="background:linear-gradient(135deg,#90EE90,#228B22)" onclick="setBg(this,'forest')"></div>
        <div class="bg-swatch" style="background:linear-gradient(135deg,#A18CD1,#FBC2EB)" onclick="setBg(this,'sunset')"></div>
      </div>

      <!-- Dialogue input -->
      <div class="dialogue-area">
        <div class="dialogue-speaker-row">
          <div class="speaker-avatar">
            <div data-char="duo" style="width:28px;height:28px;overflow:hidden;"><div data-char="duo" data-size="char-sm" style="transform:scale(0.4);transform-origin:top left;width:70px;height:86px;"></div></div>
          </div>
          <span class="speaker-name">Duo</span>
          <span style="color:var(--color-hare);font-size:11px;margin-left:2px;">speaking</span>
          <a href="04-character-picker.html" class="speaker-change" style="margin-left:auto;">Change ›</a>
        </div>
        <div class="dialogue-input-row">
          <textarea class="dialogue-field" rows="2" placeholder="Type dialogue in Spanish...">¡Hola! ¿Cómo te llamas?</textarea>
          <button class="send-btn" onclick="addDialogue()">→</button>
        </div>
        <div style="font-size:11px;font-weight:600;color:var(--color-wolf);margin-top:5px;display:flex;align-items:center;gap:5px;">
          <span>💡</span><span>Tip: Write in Spanish to match your story's language tag</span>
        </div>
      </div>

      <!-- Bottom toolbar -->
      <div class="canvas-toolbar">
        <a href="04-character-picker.html" class="tool-btn hotspot">
          <span class="tool-icon">👤</span>
          <span class="tool-label">Characters</span>
        </a>
        <button class="tool-btn active" onclick="setTool(this)">
          <span class="tool-icon">💬</span>
          <span class="tool-label">Dialogue</span>
        </button>
        <a href="05-branching-choice.html" class="tool-btn">
          <span class="tool-icon">🔀</span>
          <span class="tool-label">Choices</span>
        </a>
        <button class="tool-btn" onclick="setTool(this)">
          <span class="tool-icon">🎨</span>
          <span class="tool-label">Scene</span>
        </button>
      </div>

      <!-- Timeline strip -->
      <div class="timeline-strip">
        <div class="timeline-label">Scenes</div>
        <div class="timeline-row">
          <div class="timeline-scene active">
            <div class="timeline-scene-inner" style="background:linear-gradient(135deg,#C5EDFF,#B8E0B0)"></div>
            <div class="timeline-num">1</div>
          </div>
          <div class="timeline-scene">
            <div class="timeline-scene-inner" style="background:linear-gradient(135deg,#FFF4E8,#C49A6C)"></div>
            <div class="timeline-num">2</div>
          </div>
          <button class="timeline-add" onclick="addScene()">+</button>
        </div>
      </div>

    </main>
  </div>

  <script src="../js/characters.js"></script>
  <script>
    const bgMap = {
      park:   'linear-gradient(180deg,#C5EDFF 0%,#A8D8FF 40%,#D4EDCF 75%,#B8E0B0 100%)',
      cafe:   'linear-gradient(180deg,#FFF4E8 0%,#FFE0C0 40%,#D4A574 80%,#C49A6C 100%)',
      city:   'linear-gradient(180deg,#8EC5FC 0%,#E0C3FC 50%,#9FA8DA 80%,#7986CB 100%)',
      home:   'linear-gradient(180deg,#FFF8E7 0%,#FDECD2 40%,#E8C990 80%,#D4A860 100%)',
      forest: 'linear-gradient(180deg,#90EE90 0%,#6DBF6D 30%,#228B22 70%,#155215 100%)',
      sunset: 'linear-gradient(180deg,#F8B500 0%,#F04E23 50%,#8E3090 100%)',
    };

    function setBg(el, key) {
      document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('sceneCanvas').style.background = bgMap[key];
    }

    function setTool(el) {
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function addDialogue() {
      const val = document.querySelector('.dialogue-field').value.trim();
      if (!val) return;
      // Simulate adding dialogue line — just pulse the button
      const btn = document.querySelector('.send-btn');
      btn.style.transform = 'scale(1.2)';
      setTimeout(() => btn.style.transform = '', 200);
    }

    function addScene() {
      const row = document.querySelector('.timeline-row');
      const existing = row.querySelectorAll('.timeline-scene').length;
      const newScene = document.createElement('div');
      newScene.className = 'timeline-scene';
      newScene.innerHTML = `<div class="timeline-scene-inner" style="background:var(--studio-canvas-bg)"></div><div class="timeline-num">${existing+1}</div>`;
      row.insertBefore(newScene, row.querySelector('.timeline-add'));
      newScene.classList.add('char-bounce-in');
    }
  </script>
  <script>
    document.querySelectorAll('.hotspot').forEach(el => {
      el.addEventListener('click', () => el.classList.add('done'), { once: true });
    });
  </script>
  <a class="home-fab" href="../index.html">🏠 Main Page</a>
</body>
</html>
