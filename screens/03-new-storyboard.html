<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Screen 03 - Build It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../duolingo-design.css">
  <link rel="stylesheet" href="../design-system.css">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
    }

    .screen.builder-screen {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .builder-main {
      flex: 1;
      padding: 6px 12px 10px;
    }

    .builder-topbar {
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      align-items: center;
      padding: 4px 2px 10px;
      color: #4b4b4b;
    }

    .builder-link {
      color: #8cccf8;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .builder-link.done {
      justify-self: end;
      color: #d5d5d5;
    }

    .builder-heading {
      text-align: center;
      min-width: 0;
    }

    .builder-heading h1 {
      margin: 0;
      color: #131313;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .scene-progress {
      margin-bottom: 12px;
    }

    .scene-progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #d6d6d6;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .scene-dots {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 2px;
    }

    .scene-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.8px solid #d5d5d5;
      background: #ffffff;
      cursor: pointer;
      padding: 0;
      position: relative;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .scene-dot.active {
      border-color: #f2cb4d;
      background: #ffffff;
    }

    .scene-dot.active::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #f2cb4d;
    }

    .scene-dot:hover {
      transform: translateY(-1px);
    }

    .section-label {
      display: block;
      margin: 0 0 6px;
      color: #bcbcbc;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .builder-panel {
      margin-bottom: 12px;
    }

    .builder-input {
      width: 100%;
      box-sizing: border-box;
      border: 1.6px solid #e7e7e7;
      border-radius: 8px;
      background: #fafafa;
      color: #4b4b4b;
      font: 700 12px/1.35 'Nunito', sans-serif;
      padding: 10px 11px;
      outline: none;
      resize: none;
      transition: border-color 120ms ease, background 120ms ease;
    }

    .builder-input:focus {
      border-color: #9f74f8;
      background: #ffffff;
    }

    .preview-stage {
      height: 108px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #e6e6e6;
      background: #d9d9d9;
      overflow: hidden;
      position: relative;
    }

    .stage-character-preview {
      position: absolute;
      right: 10px;
      bottom: 0;
      width: 82px;
      height: 82px;
      object-fit: contain;
      filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.08));
    }

    .stage-character-label {
      position: absolute;
      left: 12px;
      bottom: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: #6e23e8;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .preview-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(0,0,0,0.04));
    }

    .mini-action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 9px;
    }

    .mini-action,
    .choice-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      border-radius: 8px;
      border: 1.6px solid #ececec;
      background: #ffffff;
      color: #8f8f8f;
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 0 #efefef;
    }

    .dialogue-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 9px;
      color: #4b4b4b;
      font-size: 10px;
      font-weight: 700;
    }

    .dialogue-meta span {
      color: #8f8f8f;
    }

    .dialogue-select {
      border: none;
      background: transparent;
      color: #4b4b4b;
      font: inherit;
      padding: 0;
      cursor: pointer;
    }

    .choice-button {
      width: 100%;
      min-height: 32px;
      color: #3d3d3d;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 3px 0 #e9e9e9;
    }

    .choice-button:active,
    .mini-action:active,
    .scene-dot:active {
      transform: translateY(1px);
    }

    .builder-bottom {
      margin-top: auto;
    }

    .bottom-nav.figma-nav {
      background: #ffffff;
      border-top: 1px solid #ece6f5;
      padding-top: 8px;
    }

    .figma-nav .nav-item {
      color: #b6aecb;
      gap: 5px;
    }

    .figma-nav .nav-item:nth-child(1) { color: var(--studio-figma-nav-home); }
    .figma-nav .nav-item:nth-child(2) { color: var(--studio-figma-nav-studio); }
    .figma-nav .nav-item:nth-child(3) { color: var(--studio-figma-nav-learn); }
    .figma-nav .nav-item:nth-child(4) { color: var(--studio-figma-nav-create); }
    .figma-nav .nav-item:nth-child(5) { color: var(--studio-figma-nav-social); }
    .figma-nav .nav-item:nth-child(6) { color: var(--studio-figma-nav-profile); }

    .figma-nav .nav-item.active {
      transform: translateY(-2px);
      font-weight: 900;
    }

    .figma-nav .nav-label {
      font-size: 10px;
      font-weight: 900;
    }

    .figma-nav .nav-icon svg {
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body class="demo-page">
  <div class="phone">
    <div class="status-bar" style="background:#ffffff;">
      <span class="status-time">9:27</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="currentColor"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="currentColor"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><circle cx="8" cy="10.5" r="1.5" fill="currentColor"/><path d="M8 6C6.2 6 4.6 6.8 3.4 8L2.4 7C3.9 5.5 5.8 4.6 8 4.6s4.1.9 5.6 2.4L12.6 8C11.4 6.8 9.8 6 8 6z" fill="currentColor"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="currentColor"/></svg>
      </div>
    </div>

    <main class="screen builder-screen">
      <div class="builder-main">
        <header class="builder-topbar">
          <a class="builder-link" href="03-story-type.html">Back</a>
          <div class="builder-heading">
            <h1>Scenes</h1>
          </div>
          <a class="builder-link done" href="06-preview-story.html">Done</a>
        </header>

        <section class="scene-progress" aria-label="Scene progress">
          <div class="scene-progress-head">
            <span id="sceneTitle">Scene 1</span>
            <span id="sceneCount">0/5</span>
          </div>
          <div class="scene-dots" id="sceneDots">
            <button class="scene-dot active" type="button" data-scene="1" aria-label="Scene 1"></button>
            <button class="scene-dot" type="button" data-scene="2" aria-label="Scene 2"></button>
            <button class="scene-dot" type="button" data-scene="3" aria-label="Scene 3"></button>
            <button class="scene-dot" type="button" data-scene="4" aria-label="Scene 4"></button>
            <button class="scene-dot" type="button" data-scene="5" aria-label="Scene 5"></button>
          </div>
        </section>

        <section class="builder-panel">
          <label class="section-label" for="narrationField">Narration</label>
          <textarea class="builder-input" id="narrationField" rows="2" placeholder="Type here..."></textarea>
          <div class="preview-stage" id="previewStage"></div>
          <div class="mini-action-row">
            <button class="mini-action" id="backgroundButton" type="button">Add background</button>
            <a class="mini-action" href="04-character-picker.html" id="addCharacterLink">Add character</a>
          </div>
        </section>

        <section class="builder-panel">
          <label class="section-label" for="dialogueField">Dialogue</label>
          <textarea class="builder-input" id="dialogueField" rows="2" placeholder="Type here..."></textarea>
          <div class="dialogue-meta">
            <span>Who says this?</span>
            <button class="dialogue-select" type="button" id="characterSelect">Character Select v</button>
          </div>
        </section>

        <section class="builder-panel">
          <label class="section-label" for="choiceButton">Response</label>
          <a class="choice-button" id="choiceButton" href="05-branching-choice.html">Add Choice</a>
        </section>
      </div>

      <div class="builder-bottom">
        <nav class="bottom-nav figma-nav">
          <a class="nav-item" href="01-duolingo-home-new-tab.html">
            <div class="nav-icon"><img class="nav-asset" src="../Image/figma-assets/Bottom Nav Button-Left-1-home-birdhouse.png" alt="" /></div>
            <span class="nav-label">Home</span>
          </a>
          <a class="nav-item" href="11-popularity-board.html">
            <div class="nav-icon"><img class="nav-asset" src="../Image/figma-assets/Bottom Nav Button-left-2-chest-40by40.png" alt="" /></div>
            <span class="nav-label">Cards</span>
          </a>
          <a class="nav-item" href="01-duolingo-home-new-tab.html">
            <div class="nav-icon"><img class="nav-asset" src="../Image/figma-assets/Bottom Nav Button-left3-dumbell.png" alt="" /></div>
            <span class="nav-label">Learn</span>
          </a>
          <a class="nav-item active" href="02-studio-landing.html">
            <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M4 18h16"/><path d="M5 7h7l2 2h5v7H5z"/><path d="M9 7V4"/><path d="M13 7V4"/></svg></div>
            <span class="nav-label">Studio</span>
          </a>
          <a class="nav-item" href="08-community-feed.html">
            <div class="nav-icon"><img class="nav-asset" src="../Image/figma-assets/feed-icon-left-5.png" alt="" /></div>
            <span class="nav-label">Social</span>
          </a>
          <a class="nav-item" href="#">
            <div class="nav-icon"><img class="nav-asset" src="../Image/figma-assets/Profile-left-6.png" alt="" /></div>
            <span class="nav-label">Profile</span>
          </a>
        </nav>
      </div>
    </main>
  </div>

  <script>
    const storyKey = localStorage.getItem('storymaker:selectedStoryKey');
    const selectedCharacterRaw = localStorage.getItem('storymaker:selectedCharacter');
    const narrationField = document.getElementById('narrationField');
    const dialogueField = document.getElementById('dialogueField');
    const sceneTitle = document.getElementById('sceneTitle');
    const sceneCount = document.getElementById('sceneCount');
    const previewStage = document.getElementById('previewStage');
    const characterSelect = document.getElementById('characterSelect');
    const addCharacterLink = document.getElementById('addCharacterLink');
    const sceneDots = Array.from(document.querySelectorAll('.scene-dot'));

    const storyPlaceholders = {
      funny: {
        narration: 'Type here...',
        dialogue: 'Type here...'
      },
      drama: {
        narration: 'Type here...',
        dialogue: 'Type here...'
      },
      adventure: {
        narration: 'Type here...',
        dialogue: 'Type here...'
      }
    };

    function setScene(sceneNumber) {
      sceneDots.forEach((dot, index) => {
        dot.classList.toggle('active', index === sceneNumber - 1);
      });
      sceneTitle.textContent = `Scene ${sceneNumber}`;
      sceneCount.textContent = `${sceneNumber - 1}/5`;
    }

    sceneDots.forEach((dot) => {
      dot.addEventListener('click', () => setScene(Number(dot.dataset.scene)));
    });

    document.getElementById('backgroundButton').addEventListener('click', () => {
      previewStage.style.background = 'linear-gradient(180deg, #f2d27a 0%, #f5bd6a 44%, #d4d4d4 100%)';
    });

    characterSelect.addEventListener('click', () => {
      window.location.href = '04-character-picker.html';
    });

    if (selectedCharacterRaw) {
      const selectedCharacter = JSON.parse(selectedCharacterRaw);
      if (selectedCharacter.preview) {
        previewStage.innerHTML = `
          <img class="stage-character-preview" src="${selectedCharacter.preview}" alt="Selected scene character">
          <div class="stage-character-label">Character ready</div>
        `;
      }
      characterSelect.textContent = 'Edit Character v';
      addCharacterLink.textContent = 'Change character';
    }

    if (storyKey && storyPlaceholders[storyKey]) {
      const copy = storyPlaceholders[storyKey];
      narrationField.placeholder = copy.narration;
      dialogueField.placeholder = copy.dialogue;
    }
  </script>
</body>
</html>
